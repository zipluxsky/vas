default:
  tags:
    - Docker-FIX

stages:
  - permission_test
  - deploy
  - pre_production_test

variables:
  DEPLOY_PATH: "${CI_PROJECT_DIR}"
  COMPOSE_PROJECT_NAME: "vascular"

permission_test:
  stage: permission_test
  script:
    - sudo docker ps
    - sudo docker compose version
    - cd "${CI_PROJECT_DIR}" && test -f docker-compose.yml && sudo docker compose config --quiet
  only:
    - master
    - main

.deploy_base:
  stage: deploy
  before_script:
    - cd "${DEPLOY_PATH}"
    - test -f docker-compose.yml

deploy:
  extends: .deploy_base
  script:
    - |
      PREV="${CI_COMMIT_BEFORE_SHA:-0000000000000000000000000000000000000000}"
      if [ "$PREV" = "0000000000000000000000000000000000000000" ] || ! git rev-parse -q --verify "$PREV" >/dev/null 2>&1; then
        CHANGED_FILES=""
      else
        CHANGED_FILES=$(git diff --name-only "$PREV" "$CI_COMMIT_SHA" 2>/dev/null || true)
      fi
      
      DATA_CONFIGS_ONLY=1
      HAS_DATA_CONFIGS_CHANGE=0
      
      for f in $CHANGED_FILES; do
        case "$f" in 
          configs/* | data/*) 
            HAS_DATA_CONFIGS_CHANGE=1 
            ;; 
          *) 
            DATA_CONFIGS_ONLY=0 
            ;; 
        esac
      done
      
      [ -z "$CHANGED_FILES" ] && DATA_CONFIGS_ONLY=0
      
      sync_volumes() {
        echo "Syncing configs and data into volumes..."
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_vascular-configs" 2>/dev/null || true
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_vascular-data" 2>/dev/null || true
        
        # Ensure directories exist in CI_PROJECT_DIR before trying to copy to prevent cp errors
        mkdir -p "${CI_PROJECT_DIR}/configs" "${CI_PROJECT_DIR}/data"
        
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_vascular-configs:/app/configs" \
          -v "${CI_PROJECT_DIR}/configs:/source_configs:ro" \
          alpine sh -c "find /app/configs -mindepth 1 -delete && cp -r /source_configs/. /app/configs/"
          
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_vascular-data:/app/data" \
          -v "${CI_PROJECT_DIR}/data:/source_data:ro" \
          alpine sh -c "find /app/data -mindepth 1 -delete && cp -r /source_data/. /app/data/"
      }
      
      if [ "$DATA_CONFIGS_ONLY" = 1 ] && [ "$HAS_DATA_CONFIGS_CHANGE" = 1 ]; then
        echo "Only configs/ or data/ changed → syncing volumes only (no rebuild/restart)."
        sync_volumes
      else
        echo "Full deploy (compose build + up -d)."
        cd "${DEPLOY_PATH}"
        sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" build
        sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" up -d
        
        sync_volumes
      fi
  only:
    - master
    - main

pre_production_test:
  stage: pre_production_test
  needs:
    - deploy
  before_script:
    - cd "${DEPLOY_PATH}"
    - test -f docker-compose.yml
  script:
    - echo "Testing connectivity to each configured database..."
    - sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" run --rm vascular-api python -c 'import sys; from app.core.config import settings; from app.api.deps import get_db_service; db = get_db_service(); sys.exit("MySQL connection failed") if settings.db_config.get("mysql") and not db.mysql.connect() else None; sys.exit("Sybase connection failed") if settings.db_config.get("sybase") and not db.sybase.connect() else None; out = [] if not (settings.db_config.get("mysql") or settings.db_config.get("sybase")) else [s for s in ["MySQL: OK" if settings.db_config.get("mysql") else None, "Sybase: OK" if settings.db_config.get("sybase") else None] if s]; print("No database config found; skip connectivity test" if not out else " ".join(out))'
    - echo "Testing email sending (send to self)..."
    - |
      sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" run --rm vascular-api python << 'PYEOF'
      import asyncio
      import sys
      from app.core.config import settings
      from app.api.deps import get_email_service
      ec = getattr(settings, "email_config", None) or {}
      if not (ec.get("server") or ec.get("email")):
          print("No email config; skip email sending test")
          sys.exit(0)
      svc = get_email_service()
      svc.smtp_config["default_recipient"] = svc.email
      try:
          asyncio.run(
              svc.send(
                  project="pre_production_test",
                  function="email_test",
                  html_body="<p>Pre-production email test (send to self).</p>",
                  env="dev",
                  subject_suffix="[CI]",
              )
          )
          print("Email sent to self: OK")
      except Exception as e:
          print(f"Email sending failed: {e}", file=sys.stderr)
          sys.exit(1)
      PYEOF
  only:
    - master
    - main