default:
  tags:
    - Docker-FIX

stages:
  - permission_test
  - deploy

variables:
  DEPLOY_PATH: "${CI_PROJECT_DIR}"
  COMPOSE_PROJECT_NAME: "vascular"

permission_test:
  stage: permission_test
  script:
    - sudo docker ps
    - sudo docker compose version
    - cd "${CI_PROJECT_DIR}" && test -f docker-compose.yml && sudo docker compose config --quiet
  only:
    - master
    - main

.deploy_base:
  stage: deploy
  before_script:
    - cd "${DEPLOY_PATH}"
    - test -f docker-compose.yml

deploy:
  extends: .deploy_base
  script:
    - |
      PREV="${CI_COMMIT_BEFORE_SHA:-0000000000000000000000000000000000000000}"
      if [ "$PREV" = "0000000000000000000000000000000000000000" ] || ! git rev-parse -q --verify "$PREV" >/dev/null 2>&1; then
        CHANGED_FILES=""
      else
        CHANGED_FILES=$(git diff --name-only "$PREV" "$CI_COMMIT_SHA" 2>/dev/null || true)
      fi
      
      DATA_CONFIGS_ONLY=1
      HAS_DATA_CONFIGS_CHANGE=0
      
      for f in $CHANGED_FILES; do
        case "$f" in 
          configs/* | data/*) 
            HAS_DATA_CONFIGS_CHANGE=1 
            ;; 
          *) 
            DATA_CONFIGS_ONLY=0 
            ;; 
        esac
      done
      
      [ -z "$CHANGED_FILES" ] && DATA_CONFIGS_ONLY=0
      
      sync_volumes() {
        echo "Syncing configs and data into volumes..."
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_vascular-configs" 2>/dev/null || true
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_vascular-data" 2>/dev/null || true
        
        # Ensure directories exist in CI_PROJECT_DIR before trying to copy to prevent cp errors
        mkdir -p "${CI_PROJECT_DIR}/configs" "${CI_PROJECT_DIR}/data"
        
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_vascular-configs:/app/configs" \
          -v "${CI_PROJECT_DIR}/configs:/source_configs:ro" \
          alpine sh -c "find /app/configs -mindepth 1 -delete && cp -r /source_configs/. /app/configs/"
          
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_vascular-data:/app/data" \
          -v "${CI_PROJECT_DIR}/data:/source_data:ro" \
          alpine sh -c "find /app/data -mindepth 1 -delete && cp -r /source_data/. /app/data/"
      }
      
      if [ "$DATA_CONFIGS_ONLY" = 1 ] && [ "$HAS_DATA_CONFIGS_CHANGE" = 1 ]; then
        echo "Only configs/ or data/ changed → syncing volumes only (no rebuild/restart)."
        sync_volumes
      else
        echo "Full deploy (compose build + up -d)."
        cd "${DEPLOY_PATH}"
        sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" build
        sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" up -d
        
        sync_volumes
      fi

      echo "Testing connectivity to each configured database..."
      cd "${DEPLOY_PATH}"
      sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" run --rm vascular-api python -c "
import sys
from app.core.config import settings
from app.api.deps import get_db_service
db = get_db_service()
results = []
if settings.db_config.get('mysql'):
    if not db.mysql.connect():
        sys.exit('MySQL connection failed')
    results.append('MySQL: OK')
if settings.db_config.get('sybase'):
    if not db.sybase.connect():
        sys.exit('Sybase connection failed')
    results.append('Sybase: OK')
if not results:
    print('No database config found; skip connectivity test')
else:
    print(' '.join(results))
"
  only:
    - master
    - main
