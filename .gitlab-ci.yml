# =============================================================================
# Vascular_P CI/CD Pipeline
# =============================================================================
#
# PREREQUISITES (must exist before pipeline runs):
#
#   1. GitLab Runner with tag "Docker-FIX" and sudo docker access
#   2. Base Docker image "vascular_base" pre-built on the runner host:
#        docker build -f Base_Image_Docker_File -t vascular_base .
#      Requires installer/ directory with:
#        - installer/unixODBC-2.3.12.tar.gz
#        - installer/sybasesdk16-16.0-6.x86_64.rpm
#   3. Sybase interfaces file at configs/sybase_config/interfaces
#   4. External Docker network "airflow_shared_net" (used by docker-compose):
#        docker network create airflow_shared_net
#
# CONFIGURATION FILES (under configs/, synced to Docker volumes at deploy):
#
#   configs/python_config/datasource.json  — Sybase & MySQL credentials (user/password per env)
#   configs/python_config/email_config.json — Email routing matrix (to/cc/subject per project/function/env)
#   configs/sybase_config/odbc.ini          — Sybase DSN entries (host/port/database per server tag)
#   configs/sybase_config/interfaces        — Sybase interfaces file (server address resolution)
#   data/sql/                               — SQL templates (e.g. file_confirmation/ExcelExtract.template)
#
# ENVIRONMENT VARIABLES (optional, set in GitLab CI/CD settings or docker-compose):
#
#   ENVIRONMENT          — "dev" / "prod" (default: "development" → falls back to "dev")
#   SECRET_KEY           — JWT signing key (required only if verify_token is enabled on routes)
#   ATTACHMENT_ALLOWED_DIR — Base directory for email attachment path validation (empty = reject all)
#
# =============================================================================

default:
  tags:
    - Docker-FIX

stages:
  - permission_test
  - deploy
  - pre_production_test

variables:
  DEPLOY_PATH: "${CI_PROJECT_DIR}"
  COMPOSE_PROJECT_NAME: "vascular"

permission_test:
  stage: permission_test
  script:
    - sudo docker ps
    - sudo docker compose version
    - cd "${CI_PROJECT_DIR}" && test -f docker-compose.yml && sudo docker compose config --quiet
  only:
    - master
    - main

.deploy_base:
  stage: deploy
  before_script:
    - cd "${DEPLOY_PATH}"
    - test -f docker-compose.yml

deploy:
  extends: .deploy_base
  script:
    - |
      PREV="${CI_COMMIT_BEFORE_SHA:-0000000000000000000000000000000000000000}"
      if [ "$PREV" = "0000000000000000000000000000000000000000" ] || ! git rev-parse -q --verify "$PREV" >/dev/null 2>&1; then
        CHANGED_FILES=""
      else
        CHANGED_FILES=$(git diff --name-only "$PREV" "$CI_COMMIT_SHA" 2>/dev/null || true)
      fi
      
      DATA_CONFIGS_ONLY=1
      HAS_DATA_CONFIGS_CHANGE=0
      
      for f in $CHANGED_FILES; do
        case "$f" in 
          configs/* | data/*) 
            HAS_DATA_CONFIGS_CHANGE=1 
            ;; 
          *) 
            DATA_CONFIGS_ONLY=0 
            ;; 
        esac
      done
      
      [ -z "$CHANGED_FILES" ] && DATA_CONFIGS_ONLY=0
      
      sync_volumes() {
        echo "Syncing configs and data into volumes..."
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_vascular-configs" 2>/dev/null || true
        sudo docker volume create "${COMPOSE_PROJECT_NAME}_vascular-data" 2>/dev/null || true
        
        # Ensure directories exist in CI_PROJECT_DIR before trying to copy to prevent cp errors
        mkdir -p "${CI_PROJECT_DIR}/configs" "${CI_PROJECT_DIR}/data"
        
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_vascular-configs:/app/configs" \
          -v "${CI_PROJECT_DIR}/configs:/source_configs:ro" \
          alpine sh -c "find /app/configs -mindepth 1 -delete && cp -r /source_configs/. /app/configs/"
          
        sudo docker run --rm \
          -v "${COMPOSE_PROJECT_NAME}_vascular-data:/app/data" \
          -v "${CI_PROJECT_DIR}/data:/source_data:ro" \
          alpine sh -c "find /app/data -mindepth 1 -delete && cp -r /source_data/. /app/data/"
      }
      
      if [ "$DATA_CONFIGS_ONLY" = 1 ] && [ "$HAS_DATA_CONFIGS_CHANGE" = 1 ]; then
        echo "Only configs/ or data/ changed → syncing volumes only (no rebuild/restart)."
        sync_volumes
      else
        echo "Full deploy (compose build + up -d)."
        cd "${DEPLOY_PATH}"
        sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" build
        sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" up -d
        
        sync_volumes
      fi
  only:
    - master
    - main

pre_production_test:
  stage: pre_production_test
  needs:
    - deploy
  before_script:
    - cd "${DEPLOY_PATH}"
    - test -f docker-compose.yml
  script:
    - echo "Testing connectivity to each configured database..."
    - |
      sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" run --rm vascular-api python << 'DBEOF'
      import sys
      from app.core.config import settings
      from app.api.deps import get_db_service

      db = get_db_service()
      results = []
      skipped = []

      if settings.db_config.get("mysql"):
          if not db.mysql.connect():
              sys.exit("MySQL connection failed")
          results.append("MySQL: OK")

      sb = settings.db_config.get("sybase") or {}
      if sb:
          if sb.get("host") is None or sb.get("port") is None or not sb.get("database"):
              skipped.append("Sybase: odbc.ini not found or no section/server, host/port/database not available — test skipped")
          else:
              if not db.sybase.connect():
                  sys.exit("Sybase connection failed")
              results.append("Sybase: OK")

      if skipped:
          for msg in skipped:
              print(f"Skipped: {msg}")
      if not results:
          if not skipped:
              print("No database config found; skip connectivity test")
      else:
          print(" ".join(results))
      DBEOF
    - echo "Testing SMTP connectivity (mailhost:25)..."
    - |
      sudo docker compose --project-name "${COMPOSE_PROJECT_NAME}" run --rm vascular-api python << 'PYEOF'
      import smtplib, sys

      try:
          with smtplib.SMTP("mailhost", 25, timeout=10) as server:
              server.noop()
          print("SMTP mailhost:25: OK")
      except Exception as e:
          print(f"SMTP connectivity failed: {e}", file=sys.stderr)
          print("Ensure 'mailhost' resolves within the container network and port 25 is reachable.")
          sys.exit(1)
      PYEOF
  only:
    - master
    - main
