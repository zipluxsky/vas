<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vascular Portal – Login</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f2f5;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 360px;
    }
    h1 { margin: 0 0 1.5rem 0; font-size: 1.25rem; color: #1a1a1a; }
    .form-group { margin-bottom: 1rem; }
    label { display: block; margin-bottom: 0.35rem; font-weight: 500; color: #333; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
    }
    button {
      width: 100%;
      padding: 0.6rem 1rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    .error {
      margin-top: 1rem;
      padding: 0.5rem;
      background: #fef2f2;
      color: #b91c1c;
      border-radius: 4px;
      font-size: 0.875rem;
      display: none;
    }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Vascular Portal</h1>
    <form id="loginForm" method="post" action="">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit">Sign in</button>
    </form>
    <div id="error" class="error" role="alert"></div>
  </div>
  <script>
    (function () {
      var API_BASE = '/api/v1';
      var token = sessionStorage.getItem('portal_token');
      if (token) {
        window.location.href = '/main';
        return;
      }

      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var errEl = document.getElementById('error');
        errEl.textContent = '';
        errEl.classList.remove('visible');

        var formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        fetch(API_BASE + '/login/access-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        })
          .then(function (r) {
            if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || 'Login failed'); });
            return r.json();
          })
          .then(function (data) {
            sessionStorage.setItem('portal_token', data.access_token);
            window.location.href = '/main';
          })
          .catch(function (err) {
            errEl.textContent = err.message || 'Login failed';
            errEl.classList.add('visible');
          });
      });
    })();
  </script>
</body>
</html>
