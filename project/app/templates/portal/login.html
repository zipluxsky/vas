<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vascular Portal – Sign In</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0f1729 0%, #1e3a5f 50%, #0f1729 100%);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      color: #1e293b;
    }
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 400px;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.2), 0 0 1px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .card-accent {
      height: 4px;
      background: linear-gradient(90deg, #b8860b 0%, #d4a84b 50%, #b8860b 100%);
    }
    .card-body {
      padding: 2.25rem 2rem;
    }
    .brand {
      font-size: 1.125rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #0f1729;
      margin-bottom: 0.25rem;
    }
    .brand-sub {
      font-size: 0.8125rem;
      color: #64748b;
      margin-bottom: 1.75rem;
    }
    h1 {
      margin: 0 0 1.75rem 0;
      font-size: 1.25rem;
      font-weight: 600;
      color: #0f1729;
      letter-spacing: -0.01em;
    }
    .form-group { margin-bottom: 1.25rem; }
    label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.8125rem;
      font-weight: 600;
      color: #334155;
      letter-spacing: 0.01em;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.625rem 0.75rem;
      border: 1px solid #cbd5e1;
      border-radius: 4px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: #0f1729;
      background: #f8fafc;
      transition: border-color 0.15s, background 0.15s;
    }
    input:focus {
      outline: none;
      border-color: #1e3a5f;
      background: #fff;
    }
    input::placeholder { color: #94a3b8; }
    button {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f1729;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      margin-top: 0.25rem;
      transition: background 0.15s;
    }
    button:hover { background: #1e3a5f; }
    button:active { background: #0c1322; }
    .error {
      margin-top: 1.25rem;
      padding: 0.625rem 0.75rem;
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 4px;
      font-size: 0.8125rem;
      display: none;
    }
    .error.visible { display: block; }
    .footer-note {
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: #94a3b8;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-accent"></div>
    <div class="card-body">
      <div class="brand">Vascular Portal</div>
      <div class="brand-sub">Document Management &amp; Processing</div>
      <h1>Sign in to your account</h1>
      <form id="loginForm" method="post" action="">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required autocomplete="username" placeholder="Enter your username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
        </div>
        <button type="submit">Sign in</button>
      </form>
      <div id="error" class="error" role="alert"></div>
      <p class="footer-note">Authorised use only. Secure access required.</p>
    </div>
  </div>
  <script>
    (function () {
      var API_BASE = '/api/v1';
      var token = sessionStorage.getItem('portal_token');
      if (token) {
        window.location.href = '/main';
        return;
      }

      document.getElementById('loginForm').addEventListener('submit', function (e) {
        e.preventDefault();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        var errEl = document.getElementById('error');
        errEl.textContent = '';
        errEl.classList.remove('visible');

        var formData = new URLSearchParams();
        formData.append('username', username);
        formData.append('password', password);

        fetch(API_BASE + '/login/access-token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: formData
        })
          .then(function (r) {
            if (!r.ok) return r.json().then(function (d) { throw new Error(d.detail || 'Login failed'); });
            return r.json();
          })
          .then(function (data) {
            sessionStorage.setItem('portal_token', data.access_token);
            window.location.href = '/main';
          })
          .catch(function (err) {
            errEl.textContent = err.message || 'Login failed';
            errEl.classList.add('visible');
          });
      });
    })();
  </script>
</body>
</html>
